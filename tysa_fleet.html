<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYSA Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --tysa-dark:#123329; --tysa-mid:#1C4A3B; --tysa-green:#19B269; --tysa-lime:#B2E67B; --tysa-pale:#DFF4E0;
  --paper:#F3F8F4; --card:#FFFFFF; --plate-a:#1A4634; --plate-b:#0F2B22;
  --ok:#19B269; --warn:#E09E00; --danger:#C6403D;
  --line:#D7E2DA; --ink:#123329; --ink-soft:#587065;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --disp:'Archivo','Helvetica Neue',Arial,sans-serif;
  --body:'Archivo',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5}
a{color:var(--tysa-mid)}
button{font-family:var(--body);cursor:pointer}

.topbar{background:var(--tysa-dark);color:#fff;display:flex;align-items:center;gap:14px;padding:10px 20px;position:sticky;top:0;z-index:20}
.topbar .brand{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:9px;cursor:pointer}
.topbar .brand span.lm{color:var(--tysa-lime)}
.topbar .sub{font-size:12px;color:#9CC4AE;letter-spacing:.04em}
.topbar .grow{flex:1}
.topbar button{background:transparent;border:1px solid #3A6B52;color:#DFF4E0;border-radius:6px;padding:6px 12px;font-size:13px}
.topbar button:hover{border-color:var(--tysa-lime);color:#fff}
.topbar button.primary{background:var(--tysa-green);border-color:var(--tysa-green);color:#fff;font-weight:700}
.langtoggle{display:flex;border:1px solid #3A6B52;border-radius:6px;overflow:hidden}
.langtoggle button{border:none;border-radius:0;padding:6px 10px}
.langtoggle button.active{background:var(--tysa-lime);color:#123329;font-weight:700}

main{max-width:1080px;margin:0 auto;padding:24px 20px 90px}
.backbtn{background:none;border:none;color:var(--ink-soft);font-size:13px;font-weight:700;margin-bottom:14px}
.backbtn:hover{color:var(--tysa-dark)}
.loading{text-align:center;padding:80px 20px;color:var(--ink-soft)}
.loading .spinbig{width:36px;height:36px;border:4px solid var(--tysa-pale);border-top-color:var(--tysa-green);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}

/* setup */
.setup{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px;max-width:720px;margin:32px auto}
.setup h2{font-family:var(--disp);font-weight:800;font-size:22px;letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}
.setup ol{margin:12px 0 20px 20px;color:var(--ink-soft)}
.setup ol li{margin-bottom:8px}
.gids{display:grid;grid-template-columns:repeat(2,1fr);gap:0 16px}
.errbox{background:#FBEDEC;border:1px solid #E7B6B3;color:#8C2F2B;border-radius:8px;padding:12px 14px;font-size:13px;margin-top:16px}

/* forms genéricos */
.frm label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.05em}
.frm input,.frm select,.frm textarea{width:100%;padding:12px 13px;border:2px solid var(--line);border-radius:10px;font-size:16px;font-family:var(--body);background:#fff}
.frm input.mono{font-family:var(--mono)}
.frm input:focus,.frm select:focus,.frm textarea:focus{outline:none;border-color:var(--tysa-green)}
.frm .two{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.formcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;max-width:620px;margin:0 auto}
.formcard h1{font-family:var(--disp);font-weight:800;font-size:22px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.formcard .lead{color:var(--ink-soft);font-size:13.5px;margin-bottom:8px}
.sendbtn{width:100%;background:var(--tysa-green);color:#fff;border:none;border-radius:14px;padding:16px;font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.06em;text-transform:uppercase;margin-top:20px}
.sendbtn:disabled{background:#9CC4AE}
.sendbtn:hover:not(:disabled){background:#0F8A4F}
.dmsg{font-size:13px;color:var(--danger);text-align:center;margin-top:10px;font-weight:600}

/* fleet */
.fleethead{display:flex;align-items:baseline;gap:14px;margin:6px 0 18px;flex-wrap:wrap}
.fleethead h1{font-family:var(--disp);font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.05em}
.fleethead .meta{color:var(--ink-soft);font-size:13px}
.kpirow{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:130px}
.kpi .n{font-family:var(--disp);font-weight:800;font-size:26px;line-height:1}
.kpi .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.kpi.red .n{color:var(--danger)} .kpi.amber .n{color:var(--warn)} .kpi.green .n{color:var(--ok)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.vcard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
.vcard:hover{box-shadow:0 6px 18px rgba(18,51,41,.14);transform:translateY(-2px)}
.vcard .strip{height:6px}
.strip.ok{background:var(--ok)} .strip.warn{background:var(--warn)} .strip.danger{background:var(--danger)} .strip.na{background:#9AA5AE}
.vcard .in{padding:14px 16px 16px}
.vcard .id{font-family:var(--disp);font-weight:800;font-size:24px;letter-spacing:.06em;color:var(--tysa-dark)}
.vcard .model{color:var(--ink-soft);font-size:13px;margin-bottom:10px}
.vcard .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-top:1px dashed var(--line)}
.vcard .row .k{color:var(--ink-soft)}
.vcard .row .v{font-family:var(--mono);font-size:12.5px}
.badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge.red{background:#FBEDEC;color:var(--danger)} .badge.amber{background:#FCF3DC;color:#8A6400}
.badge.green{background:#DFF4E0;color:#0F7A47} .badge.gray{background:#EDF0F2;color:var(--ink-soft)}
.addcard{border:2px dashed var(--tysa-green);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;cursor:pointer;color:#0F8A4F;background:#F7FCF6;font-weight:700;gap:6px}
.addcard:hover{background:var(--tysa-pale)}
.addcard .plus{font-size:34px;line-height:1}

/* placa */
.plate{background:linear-gradient(160deg,var(--plate-a),var(--plate-b));border:1px solid #0B2119;border-radius:14px;padding:22px 26px;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 3px 10px rgba(18,51,41,.25);margin-bottom:18px}
.plate::before,.plate::after,.plate .r1::before,.plate .r1::after{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#96A0A7 60%,#6E7880);box-shadow:inset 0 1px 2px rgba(0,0,0,.35)}
.plate::before{top:10px;left:10px}.plate::after{top:10px;right:10px}
.plate .r1::before{bottom:10px;left:10px}.plate .r1::after{bottom:10px;right:10px}
.plate .toprow{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.plate .vid{font-family:var(--disp);font-size:44px;font-weight:800;letter-spacing:.1em;line-height:1;color:var(--tysa-lime)}
.plate .vtype{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8FBCA8;margin-top:4px}
.plate .statusbig{margin-left:auto;text-align:right}
.plate .statusbig .chip{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.08em;padding:6px 14px;border-radius:6px;color:#fff;text-transform:uppercase}
.chip.ok{background:var(--ok)} .chip.warn{background:var(--warn)} .chip.danger{background:var(--danger)} .chip.na{background:#9AA5AE}
.plate .specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px 22px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(223,244,224,.22)}
.spec .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7FA893}
.spec .v{font-family:var(--mono);font-size:14px;color:#fff;word-break:break-all}

.section{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden}
.section>h3{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;padding:12px 18px;border-bottom:1px solid var(--line);background:#FAFCFA;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section>h3 .count{font-family:var(--body);font-size:11px;background:#EDF0F2;color:var(--ink-soft);border-radius:20px;padding:2px 8px;font-weight:700}
.section>h3 .act{margin-left:auto;font-family:var(--body);font-size:12px;font-weight:700;background:var(--tysa-green);color:#fff;border:none;border-radius:8px;padding:6px 12px;text-transform:none;letter-spacing:0}
.section>h3 .act:hover{background:#0F8A4F}
.section .body{padding:6px 18px 16px;overflow-x:auto}
.subhead{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 2px;display:flex;align-items:center;gap:8px}
.subhead .tag{font-family:var(--body);font-size:10px;background:var(--tysa-pale);color:#0F7A47;border-radius:4px;padding:2px 7px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);padding:10px 8px 6px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid #EEF3EF;vertical-align:top}
td.mono{font-family:var(--mono);font-size:12.5px;white-space:nowrap}
td .st{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap}
.st.ok{background:#DFF4E0;color:#0F7A47} .st.warn{background:#FCF3DC;color:#8A6400} .st.danger{background:#FBEDEC;color:var(--danger)} .st.gray{background:#EDF0F2;color:var(--ink-soft)}
.money{text-align:right;font-family:var(--mono);white-space:nowrap}
tfoot td{font-weight:700;border-top:2px solid var(--tysa-dark);border-bottom:none}
.donebtn{border:1px solid var(--tysa-green);background:#fff;color:#0F8A4F;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;white-space:nowrap}
.donebtn:hover{background:var(--tysa-pale)}
.photolinks a{display:inline-block;font-size:11.5px;background:#EDF2EE;border-radius:6px;padding:2px 8px;margin:2px 3px 0 0;text-decoration:none;color:var(--tysa-mid)}
.photolinks a:hover{background:var(--tysa-lime);color:#123329}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.thumbs img{width:88px;height:66px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
.coststrip{display:flex;gap:12px;flex-wrap:wrap;padding:14px 18px}
.costbox{flex:1;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:10px 14px}
.costbox .n{font-family:var(--disp);font-weight:800;font-size:24px}
.costbox .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.pbar{height:8px;border-radius:6px;background:#EDF0F2;overflow:hidden;display:flex;margin:6px 18px 16px}
.pbar .prev{background:var(--ok)} .pbar .corr{background:var(--danger)}
.pbarleg{display:flex;gap:16px;font-size:12px;color:var(--ink-soft);padding:0 18px 14px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
.empty{color:var(--ink-soft);font-size:13px;padding:14px 4px;font-style:italic}
.detailactions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.detailactions button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700}
.detailactions button:hover{border-color:var(--tysa-dark)}
.docsgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;padding:14px 18px}
.doccard{border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.doccard .ic{font-size:26px}
.doccard .tt{font-weight:700;font-size:14px}
.doccard .ss{font-size:12px;color:var(--ink-soft)}
.doccard a.open{margin-left:auto;background:var(--tysa-green);color:#fff;text-decoration:none;font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:8px;white-space:nowrap}
.doccard a.open:hover{background:#0F8A4F}
.doccard .miss{margin-left:auto;font-size:11.5px;color:var(--ink-soft);font-style:italic}

/* modo conductor */
.driver{max-width:560px;margin:0 auto}
.driver h1{font-family:var(--disp);font-weight:800;font-size:24px;text-transform:uppercase;letter-spacing:.05em;margin:4px 0 2px}
.driver .lead{color:var(--ink-soft);font-size:14px;margin-bottom:18px}
.dstep{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.dstep .dl{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--tysa-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dstep .dl .num{background:var(--tysa-dark);color:var(--tysa-lime);width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:none}
.menu-opt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:14px}
.menu-opt:hover{border-color:var(--tysa-green);background:#F7FCF6}
.menu-opt .mi{font-size:30px}
.menu-opt .mt{font-family:var(--disp);font-weight:800;font-size:17px}
.menu-opt .ms{font-size:12.5px;color:var(--ink-soft)}
.vehbtns{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.vehbtn{border:2px solid var(--line);background:#fff;border-radius:12px;padding:14px 10px;text-align:center;font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.05em}
.vehbtn small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--ink-soft)}
.vehbtn.sel{border-color:var(--tysa-green);background:var(--tysa-pale)}
.dinput{width:100%;padding:14px;border:2px solid var(--line);border-radius:12px;font-size:17px;font-family:var(--body)}
.dinput:focus{outline:none;border-color:var(--tysa-green)}
.dinput.mono{font-family:var(--mono);font-size:19px}
.checkitem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line)}
.checkitem:last-child{border-bottom:none}
.checkitem .cn{flex:1;font-weight:600;font-size:15px}
.seg{display:flex;border:2px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:none;background:#fff;padding:9px 13px;font-size:13px;font-weight:700;color:var(--ink-soft);min-width:52px}
.seg button.ok.on{background:var(--ok);color:#fff}
.seg button.falla.on{background:var(--danger);color:#fff}
.seg button.na.on{background:#9AA5AE;color:#fff}
.photozone{border:2px dashed var(--tysa-green);border-radius:12px;padding:18px;text-align:center;color:#0F8A4F;font-weight:700;font-size:15px;background:#F7FCF6;cursor:pointer;display:block}
.photozone input{display:none}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px}
.pgrid .pv{position:relative}
.pgrid img{width:100%;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.pgrid .pdfchip{height:80px;display:flex;align-items:center;justify-content:center;background:#EDF2EE;border-radius:8px;font-weight:700;font-size:12px;color:var(--tysa-mid)}
.pgrid .rm{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;line-height:1}
.aptobtns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.aptobtn{border:2px solid var(--line);background:#fff;border-radius:12px;padding:16px;font-family:var(--disp);font-weight:800;font-size:19px}
.aptobtn.yes.sel{border-color:var(--ok);background:#DFF4E0;color:#0F7A47}
.aptobtn.no.sel{border-color:var(--danger);background:#FBEDEC;color:var(--danger)}
.dsuccess{text-align:center;padding:60px 20px}
.dsuccess .big{font-size:64px}
.dsuccess h2{font-family:var(--disp);font-weight:800;font-size:24px;margin:10px 0 6px;text-transform:uppercase}
.dsuccess p{color:var(--ink-soft);margin-bottom:24px}
.dsuccess .warnmsg{background:#FCF3DC;border:1px solid #EAD189;color:#8A6400;border-radius:10px;padding:12px;margin:0 auto 24px;max-width:420px;font-weight:600}
.spin{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;vertical-align:-4px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

/* modal + toast */
.overlay{position:fixed;inset:0;background:rgba(18,51,41,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:#fff;border-radius:14px;padding:22px;max-width:420px;width:100%}
.modal h3{font-family:var(--disp);font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.modal .msub{font-size:13px;color:var(--ink-soft);margin-bottom:8px}
.modal .mact{display:flex;gap:10px;margin-top:18px}
.modal .mact button{flex:1;padding:12px;border-radius:10px;font-weight:800;border:1px solid var(--line);background:#fff}
.modal .mact button.go{background:var(--tysa-green);color:#fff;border-color:var(--tysa-green)}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--tysa-dark);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:60;transition:transform .25s;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

footer{max-width:1080px;margin:0 auto;padding:0 20px 30px;color:#8A96A0;font-size:12px}
.printhead{display:none}
@media print{
  .printhead{display:flex;align-items:center;gap:10px;padding:0 0 14px;border-bottom:3px solid #19B269;margin-bottom:16px}
  .printhead .ph-t{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:.08em;color:#123329}
  .printhead .ph-s{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#587065}
  .topbar,.backbtn,.detailactions,footer,.section>h3 .act,.donebtn{display:none!important}
  body{background:#fff}
  main{max-width:100%;padding:0}
  .section,.plate{break-inside:avoid;box-shadow:none}
}
@media (max-width:640px){
  .plate .vid{font-size:32px}
  .gids,.frm .two{grid-template-columns:1fr}
  .topbar{padding:10px 12px;gap:8px}
  .topbar .sub{display:none}
}
@media (prefers-reduced-motion:reduce){.spin,.loading .spinbig{animation:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="go('#/')">
    <svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true">
      <g fill="#B2E67B"><path id="bl" d="M50 50 C 52 26, 64 10, 82 12 C 66 18, 56 34, 55 50 Z"/>
      <use href="#bl" transform="rotate(51.4 50 50)"/><use href="#bl" transform="rotate(102.8 50 50)"/>
      <use href="#bl" transform="rotate(154.2 50 50)"/><use href="#bl" transform="rotate(205.7 50 50)"/>
      <use href="#bl" transform="rotate(257.1 50 50)"/><use href="#bl" transform="rotate(308.5 50 50)"/></g>
      <circle cx="50" cy="50" r="6" fill="#19B269"/></svg>
    <span style="color:#fff">TYSA</span> <span class="lm">FLEET</span>
  </div>
  <div class="grow"></div>
  <button class="primary" onclick="go('#/conductor')">🚚 <span class="hide-sm">Conductores</span></button>
  <button id="btnRefresh" style="display:none" onclick="refreshData()">⟳</button>
  <div class="langtoggle">
    <button id="btnES" class="active" onclick="setLang('es')">ES</button>
    <button id="btnEN" onclick="setLang('en')">EN</button>

function rowsAfterHeader(rows,anchor){
  const i=rows.findIndex(r=>norm(r[0]).toLowerCase().startsWith(anchor));
  return i<0?[]:rows.slice(i+1).filter(r=>norm(r[0])!=="");
}

  DATA={veh,plan,insp,ots,fuel,wash,crew};
}

function vehStats(vid){
  const plan=DATA.plan.filter(p=>p.vid===vid);
  const ots=DATA.ots.filter(o=>o.vid===vid);
  const insp=DATA.insp.filter(i=>i.vid===vid);
  const overdue=plan.filter(p=>statusClass(p.status)==="danger").length;
  const soon=plan.filter(p=>statusClass(p.status)==="warn").length;
  const open=ots.filter(o=>/abierta|en taller|open/i.test(o.status)).length;
  const cost=ots.reduce((s,o)=>s+(money(o.total)||money(o.parts)+money(o.labor)),0);
  const yr=new Date().getFullYear();
  const costYr=ots.filter(o=>{const d=parseDate(o.date);return d&&d.getFullYear()===yr}).reduce((s,o)=>s+(money(o.total)||money(o.parts)+money(o.labor)),0);
  const costPrev=ots.filter(o=>/prev/i.test(o.type)).reduce((s,o)=>s+(money(o.total)||money(o.parts)+money(o.labor)),0);
  const costCorr=ots.filter(o=>/corr/i.test(o.type)).reduce((s,o)=>s+(money(o.total)||money(o.parts)+money(o.labor)),0);
  const overall=plan.length===0?"na":overdue>0?"danger":(soon>0||open>0)?"warn":"ok";
  const fuel=(DATA.fuel||[]).filter(f=>f.vid===vid);
  const fuelYrList=fuel.filter(f=>{const d=parseDate(f.date);return d&&d.getFullYear()===yr});
  const fuelYr=fuelYrList.reduce((a,f)=>a+money(f.cost),0);
  const galYr=fuelYrList.reduce((a,f)=>a+(parseFloat(f.gal)||0),0);
  const byMi=[...fuel].map(f=>({mi:parseFloat(norm(f.mi).replace(/,/g,"")),gal:parseFloat(f.gal)||0}))
    .filter(f=>!isNaN(f.mi)&&f.mi>0).sort((a,b)=>a.mi-b.mi);
  let miles=0,gals=0;
  for(let i=1;i<byMi.length;i++){const dm=byMi[i].mi-byMi[i-1].mi;
    if(dm>0&&dm<2000&&byMi[i].gal>0){miles+=dm;gals+=byMi[i].gal}}
  const mpg=gals>0?miles/gals:0;
  const totGal=fuel.reduce((a,f)=>a+(parseFloat(f.gal)||0),0);
  const totFuelCost=fuel.reduce((a,f)=>a+money(f.cost),0);
  const avgPpg=totGal>0?totFuelCost/totGal:0;
  const cpm=mpg>0&&avgPpg>0?avgPpg/mpg:0;
  const wash=(DATA.wash||[]).filter(x=>x.vid===vid);
  const washSorted=[...wash].sort((a,b)=>(parseDate(b.date)||0)-(parseDate(a.date)||0));
  const lastWash=washSorted[0]||null;
  const washDays=lastWash&&parseDate(lastWash.date)?Math.floor((new Date()-parseDate(lastWash.date))/864e5):null;
  const washYr=wash.filter(x=>{const d=parseDate(x.date);return d&&d.getFullYear()===yr}).reduce((a,x)=>a+money(x.cost),0);
  return{plan,ots,insp,overdue,soon,open,cost,costYr,costPrev,costCorr,overall,fuel,fuelYr,galYr,mpg,cpm,wash:washSorted,lastWash,washDays,washYr};
}

/* =====================================================================
   ROUTER — el botón atrás del navegador funciona en toda la app
===================================================================== */
const app=document.getElementById("app");
function route(){
  let h=location.hash;
  // rutas legadas
  if(h==="#conductor")return go("#/conductor");
  if(h==="#pretrip")return go("#/pretrip");
  if(h==="#tanqueo")return go("#/tanqueo");
  chrome();
  if(LOADING){app.innerHTML=`<div class="loading"><div class="spinbig"></div>${t("loading")}</div>`;return}
  const seg=h.replace(/^#\//,"").split("/");
  const page=seg[0]||"";
  const needsData=["","vehiculo","nuevo-vehiculo","doc","nueva-ot","conductor","pretrip","tanqueo"];
  if(!DATA&&needsData.includes(page)&&page!==""){/* deep link sin datos */}
  if(!DATA&&page===""){renderSetup();return}
  if(!DATA){renderSetup();return}
  switch(page){
    case "": renderFleet();break;
    case "vehiculo": renderVehicle(decodeURIComponent(seg[1]||""));break;
    case "nuevo-vehiculo": renderNewVehicle();break;
    case "doc": renderUploadDoc(decodeURIComponent(seg[1]||""));break;
    case "nueva-ot": renderNewOT(decodeURIComponent(seg[1]||""));break;
    case "conductor": renderDriverHome();break;
    case "pretrip": renderPreTrip();break;
    case "tanqueo": renderFuelForm();break;
    case "lavada": renderWashForm();break;
    case "combustible": renderFuelReport();break;
    case "equipo": renderTeam();break;
    case "ok": renderDone(seg[1]);break;
    default: renderFleet();
  }
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);
function chrome(){
  document.getElementById("subTitle")&& (document.getElementById("subTitle").textContent=t("sub"));
  document.getElementById("foot").textContent=t("foot")+(DEMO?" · "+t("demoNote"):"");
  document.getElementById("btnES").classList.toggle("active",lang==="es");
  document.getElementById("btnEN").classList.toggle("active",lang==="en");
  document.getElementById("btnRefresh").style.display=(SRC.sheetId&&!DEMO)?"":"none";
}
function render(){route()}
window.setLang=l=>{lang=l;render()};

/* ---------- setup ---------- */
function renderSetup(msg){
  const s=I18N[lang];
  app.innerHTML=`<div class="setup frm">
    <h2>${s.setupTitle}</h2>
    <ol>${s.setupSteps.map(x=>`<li>${x}</li>`).join("")}</ol>
    <label>${s.lblSheet}</label><input class="mono" id="inSheet" value="${esc(SRC.sheetId)}" placeholder="1AbC...xyz">
    <label>${s.lblScript}</label><input class="mono" id="inScript" value="${esc(SRC.scriptUrl)}" placeholder="https://script.google.com/macros/s/.../exec">
    <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap">
      <button class="sendbtn" style="flex:1;min-width:160px;margin-top:0" id="btnConnect">${s.btnConnect}</button>
      <button class="sendbtn" style="flex:1;min-width:160px;margin-top:0;background:#fff;color:#0F8A4F;border:2px solid var(--tysa-green)" id="btnDemo">${s.btnDemo}</button>
    </div>
    ${msg?`<div class="errbox">${esc(msg)}</div>`:""}
  </div>`;
  document.getElementById("btnConnect").onclick=async()=>{
    const rawId=norm(document.getElementById("inSheet").value);
    const m=rawId.match(/\/d\/([\w-]{20,})/);
    SRC.sheetId=m?m[1]:rawId;
    const rawScript=norm(document.getElementById("inScript").value);
    SRC.scriptUrl=/script\.google\.com/.test(rawScript)?rawScript:SRC.scriptUrl||CONFIG.scriptUrl;
    if(!SRC.sheetId){renderSetup(t("errLoad"));return}
    DEMO=false;LOADING=true;render();
    try{await loadAll();LOADING=false;go("#/")}
    catch(e){LOADING=false;DATA=null;renderSetup(t("errLoad"))}
  };
  document.getElementById("btnDemo").onclick=()=>{loadDemo();go("#/")};
}

function nextVehId(){
  // sugiere siguiendo el patrón del último vehículo (BUCKET-1 → BUCKET-3, TYSA-01 → TYSA-02...)
  const pats={};
  DATA.veh.forEach(v=>{const m=v.id.match(/^(.*?)(\d+)$/);if(m)pats[m[1]]=Math.max(pats[m[1]]||0,parseInt(m[2],10))});
  const keys=Object.keys(pats);
  if(!keys.length)return "";
  const pre=keys.sort((a,b)=>pats[b]-pats[a] && 0)[0];
  const bucketPre=keys.find(k=>/bucket/i.test(k));
  const usePre=bucketPre||keys[0];
  return usePre+(pats[usePre]+1);
}

window.pickDoc=async inp=>{
  const file=inp.files[0];if(!file)return;
  if(file.size>10*1024*1024){toast("⚠️ Archivo muy grande (máx 10 MB)");return}
  if(file.type==="application/pdf"){
    const data=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)});
    FORM.file={data,isPdf:true,name:file.name};
  }else{
    const data=await compressImage(file,1600,.8);
    FORM.file={data,isPdf:false,name:file.name};
  }
  render();
};

/* ---------- reporte de combustible por fechas / semanal ---------- */
const toISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
function weekStart(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}
function frPreset(kind){
  const now=new Date();let from,to=new Date(now);
  if(kind==="thisWeek"){from=weekStart(now)}
  else if(kind==="lastWeek"){to=new Date(weekStart(now).getTime()-864e5);from=weekStart(to)}
  else if(kind==="thisMonth"){from=new Date(now.getFullYear(),now.getMonth(),1)}
  else if(kind==="lastMonth"){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0)}
  else if(kind==="d30"){from=new Date(now.getTime()-30*864e5)}
  else{from=new Date(now.getFullYear(),0,1)}
  FORM.frFrom=toISO(from);FORM.frTo=toISO(to);FORM.frPreset=kind;render();
}
function renderFuelReport(){
  if(!FORM.frFrom)frPreset.call(null,"thisMonth")||0;
  if(!FORM.frFrom){const now=new Date();FORM.frFrom=toISO(new Date(now.getFullYear(),now.getMonth(),1));FORM.frTo=toISO(now)}
  const from=new Date(FORM.frFrom+"T00:00:00"), to=new Date(FORM.frTo+"T23:59:59");
  const vehFilter=FORM.frVeh||"";
  const rows=(DATA.fuel||[]).filter(f=>{
    const d=parseDate(f.date);
    return d&&d>=from&&d<=to&&(!vehFilter||f.vid===vehFilter);
  });
  const totCost=rows.reduce((a,f)=>a+money(f.cost),0);
  const totGal=rows.reduce((a,f)=>a+(parseFloat(f.gal)||0),0);
  const avg=totGal>0?totCost/totGal:0;
  // agrupar por semana (lunes a domingo)
  const weeks={};
  rows.forEach(f=>{const d=parseDate(f.date);const ws=weekStart(d);const k=toISO(ws);
    weeks[k]=weeks[k]||{start:ws,cost:0,gal:0,n:0};
    weeks[k].cost+=money(f.cost);weeks[k].gal+=parseFloat(f.gal)||0;weeks[k].n++});
  const weekRows=Object.values(weeks).sort((a,b)=>b.start-a.start);
  const wkLabel=ws=>{const we=new Date(ws.getTime()+6*864e5);
    const f=d=>d.toLocaleDateString(lang==="es"?"es-CO":"en-US",{month:"short",day:"numeric"});
    return f(ws)+" – "+f(we)};
  // por vehículo
  const byVeh={};
  rows.forEach(f=>{byVeh[f.vid]=byVeh[f.vid]||{cost:0,gal:0,n:0};
    byVeh[f.vid].cost+=money(f.cost);byVeh[f.vid].gal+=parseFloat(f.gal)||0;byVeh[f.vid].n++});
  const presets=[["thisWeek",t("prThisWeek")],["lastWeek",t("prLastWeek")],["thisMonth",t("prThisMonth")],["lastMonth",t("prLastMonth")],["d30",t("pr30")],["year",t("prYear")]];
  app.innerHTML=`
    <button class="backbtn" onclick="goBack()">${t("back")}</button>
    <div class="fleethead"><h1>${t("frTitle")}</h1></div>
    <div class="section"><div class="body frm" style="padding-top:12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
        ${presets.map(([k,l])=>`<button class="donebtn" style="${FORM.frPreset===k?"background:var(--tysa-pale);border-color:var(--tysa-green)":""}" onclick="frPreset('${k}')">${l}</button>`).join("")}
      </div>
      <div class="two" style="max-width:520px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px">
        <div><label>${t("frFrom")}</label><input type="date" class="mono" value="${FORM.frFrom}" onchange="FORM.frFrom=this.value;FORM.frPreset='';render()"></div>
        <div><label>${t("frTo")}</label><input type="date" class="mono" value="${FORM.frTo}" onchange="FORM.frTo=this.value;FORM.frPreset='';render()"></div>
        <div><label>${t("frVeh")}</label><select onchange="FORM.frVeh=this.value;render()">
          <option value="">${t("frAll")}</option>
          ${DATA.veh.map(v=>`<option value="${esc(v.id)}" ${vehFilter===v.id?"selected":""}>${esc(v.id)}</option>`).join("")}
        </select></div>
      </div>
    </div></div>
    <div class="kpirow">
      <div class="kpi"><div class="n">${fmtMoney(totCost)}</div><div class="l">${t("frCost")}</div></div>
      <div class="kpi"><div class="n">${totGal?totGal.toFixed(1):"0"}</div><div class="l">${t("frGal")}</div></div>
      <div class="kpi"><div class="n">${avg?"$"+avg.toFixed(2):"—"}</div><div class="l">${t("frAvg")}</div></div>
      <div class="kpi"><div class="n">${rows.length}</div><div class="l">${t("frFills")}</div></div>
    </div>
    <div class="section"><h3>${t("frByWeek")}</h3>
      <div class="body">${weekRows.length?`<table><thead><tr><th>${t("frWeek")}</th><th>${t("frFills")}</th><th>${t("frGal")}</th><th style="text-align:right">${t("frCost")}</th></tr></thead><tbody>${
        weekRows.map(w=>`<tr><td>${wkLabel(w.start)}</td><td class="mono">${w.n}</td><td class="mono">${w.gal.toFixed(1)}</td><td class="money">${fmtMoney(w.cost)}</td></tr>`).join("")
      }</tbody><tfoot><tr><td colspan="3">${t("total")}</td><td class="money">${fmtMoney(totCost)}</td></tr></tfoot></table>`:`<div class="empty">${t("none")}</div>`}</div>
    </div>
    <div class="section"><h3>${t("frByVeh")}</h3>
      <div class="body">${Object.keys(byVeh).length?`<table><thead><tr><th>${t("frVeh")}</th><th>${t("frFills")}</th><th>${t("frGal")}</th><th style="text-align:right">${t("frCost")}</th></tr></thead><tbody>${
        Object.entries(byVeh).sort((a,b)=>b[1].cost-a[1].cost).map(([vid,x])=>`<tr><td class="mono"><a href="#/vehiculo/${encodeURIComponent(vid)}">${esc(vid)}</a></td><td class="mono">${x.n}</td><td class="mono">${x.gal.toFixed(1)}</td><td class="money">${fmtMoney(x.cost)}</td></tr>`).join("")
      }</tbody></table>`:`<div class="empty">${t("none")}</div>`}</div>

function nameStep(num){
  const crew=activeCrew();

      <input class="dinput" value="${esc(DRV.name)}" placeholder="Nombre y apellido" oninput="DRV.name=this.value">

window.addPhotos=async inp=>{
  for(const f of inp.files){const c=await compressImage(f,1280,.72);if(c)DRV.photos.push(c)}
  render();
};
function compressImage(file,maxW,q){return new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const sc=Math.min(1,maxW/img.width);
    const cv=document.createElement("canvas");
    cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    res(cv.toDataURL("image/jpeg",q));
    URL.revokeObjectURL(img.src);
  };
  img.onerror=()=>res(null);
  img.src=URL.createObjectURL(file);
})}

  DRV.sending=true;render();

      millaje:norm(DRV.mi),items:{...DRV.items},apto:DRV.apto,obs:norm(DRV.obs),fotos:DRV.photos.filter(Boolean)});

};
